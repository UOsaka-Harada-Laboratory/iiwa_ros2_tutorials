services:
    iiwa_ros2_ws:
        build:
            context: ./docker
            dockerfile: Dockerfile
            args:
                MAKEFLAGS: -j4
                PARALLELWORKERS: 4
        container_name: iiwa_ros2_container
        environment:
            # X11 forwarding for RViz and joint_state_publisher_gui.
            - DISPLAY=$DISPLAY
            - QT_X11_NO_MITSHM=1
            - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
            # Keep this workspace isolated from other host-network ROS 2 containers.
            - ROS_DOMAIN_ID=${IIWA_ROS_DOMAIN_ID:-73}
        volumes:
            # for USB devices
            - /dev:/dev
            # X11 socket for GUI applications. Allow access with `xhost local:`.
            - /tmp/.X11-unix:/tmp/.X11-unix:rw
            # shared dirs
            - ./yaml:/yaml
            - ./ros2_ws/src/lbr_fri_ros2_stack:/root/ros2_ws/src/lbr-stack/src/lbr_fri_ros2_stack
            - ./docker/ros2_ws/src/pyfri:/root/pyfri
        privileged: true
        tty: true
        network_mode: host
        command: bash -c "source /opt/ros/humble/setup.bash && cd /root/ros2_ws && colcon build --executor sequential --parallel-workers 1 --symlink-install --mixin release && source /root/ros2_ws/install/setup.bash && bash"
